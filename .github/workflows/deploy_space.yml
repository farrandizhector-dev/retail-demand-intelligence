name: Deploy to HF Space

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "data/gold/serving/**"

jobs:
  deploy:
    name: Build and deploy to Hugging Face Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install npm dependencies
        run: cd app && npm ci
      - name: Build frontend
        run: cd app && npm run build
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd app/dist
          git init
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy V3 — $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push --force https://HF_USER:${HF_TOKEN}@huggingface.co/spaces/HF_USER/ai-supply-chain-control-tower main
