lightgbm:
  model_type: "global"
  objective: "regression"
  metric: "mae"
  hyperparameters:
    n_estimators: 2000
    learning_rate: 0.03
    num_leaves: 255
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    max_bin: 255
  early_stopping_rounds: 100
  categorical_features:
    - store_id
    - dept_id
    - cat_id
    - state_id
    - day_of_week
    - month
  training_strategy:
    cv_type: "rolling_origin"
    n_folds: 5
    forecast_horizon: 28
    gap: 0

quantile:
  method: "lightgbm_quantile"
  quantiles: [0.10, 0.25, 0.50, 0.75, 0.90]
  conformal:
    enabled: true
    method: "conformal_quantile_regression"
    calibration_set: "last_fold_validation"
    target_coverage: 0.80
  monotonicity_check:
    rule: "p10 <= p25 <= p50 <= p75 <= p90 for every observation"
    fix: "if violated, interpolate linearly between valid quantiles"

